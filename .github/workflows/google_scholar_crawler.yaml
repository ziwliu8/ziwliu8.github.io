name: Get Citation Data

on:
  push:
    branches:
      - main
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Fetch Google Scholar citations
        working-directory: google_scholar_crawler
        env:
          GOOGLE_SCHOLAR_ID: _H3nmDQAAAAJ
        run: |
          pip install -r requirements.txt
          python main.py
      - name: Publish citation data
        working-directory: google_scholar_crawler/results
        run: |
          git init
          git config --local user.name "${GITHUB_ACTOR}"
          git config --local user.email "${GITHUB_ACTOR_ID}+${GITHUB_ACTOR}@users.noreply.github.com"
          git add *.json
          git commit -m "Update citation data"
          git push "https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/${GITHUB_REPOSITORY}.git" HEAD:google-scholar-stats --force